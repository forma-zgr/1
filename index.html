<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запись на фитнес</title>
<style>
:root {
  --bg: #f0f2f5; --card: #fff; --text: #333; --text2: #777; --text3: #999;
  --border: #f0f0f0; --green: #4caf50; --green-h: #43a047; --red: #ef5350;
  --red-h: #e53935; --green-bg: #e8f5e9; --green-cl: #2e7d32;
  --admin-bg: #fff3e0; --admin-bd: #ffcc80; --admin-cl: #e65100;
  --shadow: 0 2px 8px rgba(0,0,0,.08); --input-bd: #ddd;
  --modal-bg: #fff; --header-bg: #fff; --badge-bg: #ff9800;
}

[data-theme="dark"] {
  --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --text2: #aaa;
  --text3: #777; --border: #2a2a2a; --green: #66bb6a; --green-h: #4caf50;
  --red: #ef5350; --red-h: #e53935; --green-bg: #1b3a1b; --green-cl: #81c784;
  --admin-bg: #3e2723; --admin-bd: #5d4037; --admin-cl: #ffab91;
  --shadow: 0 2px 8px rgba(0,0,0,.3); --input-bd: #444;
  --modal-bg: #252525; --header-bg: #1e1e1e; --badge-bg: #ff9800;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:var(--bg);min-height:100vh;padding:20px 16px;
  color:var(--text);transition:background .3s,color .3s
}
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  max-width:600px;margin:0 auto 16px
}
.header{text-align:center;user-select:none;flex:1}
h1{color:var(--text);font-size:22px;cursor:default;transition:color .3s}
h1 .icon{font-size:28px}
.badge{display:none;background:var(--badge-bg);color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;margin-top:6px}
.conn-status{
  display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;
  margin-top:4px;color:#fff
}
.conn-ok{background:#4caf50}
.conn-err{background:#e53935}
.conn-wait{background:#ff9800}

/* Кнопка темы */
.theme-btn{
  background:var(--card);border:1px solid var(--input-bd);border-radius:50%;
  width:40px;height:40px;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:background .3s,transform .2s;flex-shrink:0
}
.theme-btn:hover{transform:scale(1.1)}

.day{
  background:var(--card);border-radius:12px;padding:18px;margin-bottom:14px;
  box-shadow:var(--shadow);max-width:600px;margin-left:auto;margin-right:auto;
  transition:background .3s
}
.day-title{
  font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px;
  padding-bottom:8px;border-bottom:2px solid var(--green);transition:color .3s
}
.slot{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap
}
.slot:last-child{border-bottom:none}
.slot-left{flex:1;min-width:180px}
.slot-time{font-weight:600;color:var(--text);font-size:15px}
.slot-names{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5}
.slot-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.count{
  background:var(--green-bg);color:var(--green-cl);padding:4px 10px;
  border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap
}
.btn{border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.btn-sign{background:var(--green);color:#fff}.btn-sign:hover{background:var(--green-h)}
.btn-cancel{background:var(--red);color:#fff}.btn-cancel:hover{background:var(--red-h)}
.btn-del{background:none;color:var(--text3);border:none;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1}
.btn-del:hover{color:var(--red)}
.btn-clear{
  background:var(--red);color:#fff;border:none;cursor:pointer;
  font-size:11px;padding:3px 8px;border-radius:4px;white-space:nowrap;opacity:.8
}
.btn-clear:hover{opacity:1}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:var(--modal-bg);padding:24px;border-radius:14px;width:90%;max-width:300px;transition:background .3s}
.modal-box h3{margin-bottom:14px;color:var(--text);font-size:17px}
.modal-box input{
  width:100%;padding:11px 12px;border:2px solid var(--input-bd);
  border-radius:8px;font-size:15px;outline:none;background:var(--card);
  color:var(--text);transition:background .3s,border-color .3s,color .3s
}
.modal-box input:focus{border-color:var(--green)}
.modal-box .btn-ok{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:12px}
.modal-box .btn-ok:hover{background:var(--green-h)}

.admin-panel{
  background:var(--admin-bg);border:1px solid var(--admin-bd);
  border-radius:12px;padding:16px;margin-top:20px;display:none;
  max-width:600px;margin-left:auto;margin-right:auto
}
.admin-panel h3{color:var(--admin-cl);margin-bottom:10px;font-size:15px}
.admin-panel p{color:var(--text2);font-size:13px;line-height:1.6}

@media(max-width:400px){
  .slot{flex-direction:column;align-items:flex-start}
  .slot-right{align-self:flex-end}
}
</style>
</head>
<body>

<div class="top-bar">
<div class="header">
  <img src="logo.jpg" alt="Форма" style="height:50px;margin-bottom:6px">
  <h1 onclick="tapAdmin()">Запись на занятия</h1>
  <div class="badge" id="badge">⭐ Администратор</div>
  <div id="connStatus" class="conn-status conn-wait">Подключение...</div>
</div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Тема">🌙</button>
</div>

<div id="schedule"></div>

<div class="admin-panel" id="adminPanel">
  <h3>⭐ Панель администратора</h3>
  <p>Рядом с каждым именем — кнопка <b>✕</b> для удаления записи.</p>
  <p style="margin-top:8px">Под каждым занятием — кнопка <b>Очистить</b>.</p>
  <button onclick="exitAdmin()" style="margin-top:12px;padding:8px 16px;background:#e53935;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Выйти из режима администратора</button>
</div>

<!-- Модалка: запись -->
<div class="modal" id="mSign">
  <div class="modal-box">
    <h3>Как вас зовут?</h3>
    <input type="text" id="iName" placeholder="Ваше имя" maxlength="30">
    <button class="btn-ok" onclick="doSign()">Записаться ✓</button>
  </div>
</div>

<!-- Модалка: админ-код -->
<div class="modal" id="mAdmin">
  <div class="modal-box">
    <h3>🔑 Код администратора</h3>
    <input type="password" id="iCode" placeholder="Введите код">
    <button class="btn-ok" onclick="tryAdmin()">Подтвердить</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ====== НАСТРОЙКИ ====== */
function exitAdmin(){
  if(!uid || !db) return;
  db.ref("admins/" + uid).remove();
}
var firebaseConfig = {
  apiKey: "AIzaSyCmJcDses0fO1s9E5ZoSSRhiEdCcEr3emI",
  authDomain: "forma-fit-zgr.firebaseapp.com",
  databaseURL: "https://forma-fit-zgr-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "forma-fit-zgr",
  storageBucket: "forma-fit-zgr.firebasestorage.app",
  messagingSenderId: "1091167121540",
  appId: "1:1091167121540:web:43f386e58ed6519472d2d1",
  measurementId: "G-PX9Z0G911P"
};

var ADMIN_CODE = "fit2024";

var DAYS = [
  {day:"Понедельник", cls:[
    {id:"m1", time:"09:00", name:"Йога", max:15},
    {id:"m2", time:"18:00", name:"Фитнес", max:20},
    {id:"m3", time:"19:30", name:"Бокс", max:12}
  ]},
  {day:"Среда", cls:[
    {id:"w1", time:"09:00", name:"Йога", max:15},
    {id:"w2", time:"12:00", name:"Стретчинг", max:10},
    {id:"w3", time:"18:00", name:"Фитнес", max:20}
  ]},
  {day:"Пятница", cls:[
    {id:"f1", time:"09:00", name:"Йога", max:15},
    {id:"f2", time:"17:00", name:"Танцы", max:15}
  ]}
];

/* ====== ПЕРЕМЕННЫЕ ====== */
var uid = null;
var isAdmin = false;
var bookData = {};
var pendingSlot = null;
var db = null;

/* ====== ТЕМА ====== */
(function initTheme(){
  var saved = localStorage.getItem("theme");
  if(saved === "dark"){
    document.documentElement.setAttribute("data-theme","dark");
  }
})();

function applyThemeBtn(){
  var dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.getElementById("themeBtn").textContent = dark ? "☀️" : "🌙";
}

function toggleTheme(){
  var dark = document.documentElement.getAttribute("data-theme") === "dark";
  if(dark){
    document.documentElement.removeAttribute("data-theme");
    localStorage.setItem("theme","light");
  } else {
    document.documentElement.setAttribute("data-theme","dark");
    localStorage.setItem("theme","dark");
  }
  applyThemeBtn();
}

applyThemeBtn();

/* ====== ОТРИСОВКА (работает даже без Firebase!) ====== */
function render(){
  var el = document.getElementById("schedule");
  var html = "";

  DAYS.forEach(function(day){
    html += '<div class="day"><div class="day-title">' + esc(day.day) + "</div>";

    day.cls.forEach(function(slot){
      var entries = bookData[slot.id] || {};
      var list = Object.keys(entries).map(function(k){
        return {uid:k, name:entries[k].name};
      });
      var mine = uid && entries[uid];
      var full = list.length >= slot.max;

      html += '<div class="slot"><div class="slot-left">';
      html += '<div class="slot-time">' + esc(slot.time) + " \u2014 " + esc(slot.name) + "</div>";
      html += '<div class="slot-names">';

      if(list.length){
        html += "\uD83D\uDC65 ";
        list.forEach(function(p, i){
          if(i > 0) html += ", ";
          html += esc(p.name);
          if(isAdmin){
            html += ' <button class="btn-del" onclick="adminRemove(\''+slot.id+"','"+p.uid+"')\">\u2715</button>";
          }
        });
      } else {
        html += "Пока никто не записался";
      }

      html += '</div></div><div class="slot-right">';
      html += '<span class="count">' + list.length + "/" + slot.max + "</span>";

      if(uid && mine){
        html += '<button class="btn btn-cancel" onclick="cancel(\''+slot.id+"')\">Отмена</button>";
      } else if(!full){
        html += '<button class="btn btn-sign" onclick="openSign(\''+slot.id+"')\">\u{1F64B} Записаться</button>";
      } else {
        html += '<span style="color:var(--red);font-size:12px">Мест нет</span>';
      }

      if(isAdmin && list.length > 0){
        html += '<button class="btn-clear" onclick="adminClear(\''+slot.id+"')\">Очистить</button>";
      }

      html += "</div></div>";
    });

    html += "</div>";
  });

  el.innerHTML = html;
}

function esc(s){
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ★ Рисуем расписание СРАЗУ (без Firebase)
render();

/* ====== FIREBASE ====== */
try {
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  db = firebase.database();

  auth.signInAnonymously().catch(function(e){
    console.error("Auth error:", e);
    setStatus("err","Ошибка авторизации");
  });

  auth.onAuthStateChanged(function(user){
    if(!user) return;
    uid = user.uid;
    setStatus("ok","Онлайн");

    db.ref("bookings").on("value", function(s){
      bookData = s.val() || {};
      render();
    }, function(e){
      console.error("Read error:", e);
      setStatus("err","Ошибка чтения");
    });

    db.ref("admins/" + uid).on("value", function(s){
      isAdmin = s.val() === true;
      document.getElementById("badge").style.display = isAdmin ? "inline-block" : "none";
      document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";
      render();
    });
  });

} catch(e) {
  console.error("Firebase init error:", e);
  setStatus("err","Нет подключения");
}

function setStatus(type, text){
  var el = document.getElementById("connStatus");
  el.textContent = text;
  el.className = "conn-status conn-" + type;
}

/* ====== АДМИНКА ====== */
var taps = 0;
var tapTimer = null;

function tapAdmin(){
  taps++;
  if(taps >= 5){
    taps = 0;
    if(isAdmin){
      alert("Вы уже администратор!");
    } else {
      document.getElementById("mAdmin").classList.add("show");
      var inp = document.getElementById("iCode");
      inp.value = "";
      inp.focus();
    }
  }
  clearTimeout(tapTimer);
  tapTimer = setTimeout(function(){ taps = 0; }, 1000);
}

function tryAdmin(){
  var code = document.getElementById("iCode").value;
  if(code === ADMIN_CODE && uid && db){
    db.ref("admins/" + uid).set(true);
    closeModal("mAdmin");
  } else if(!uid){
    alert("Подождите загрузки...");
  } else {
    alert("Неверный код!");
  }
}

/* ====== МОДАЛКИ ====== */
function openSign(slotId){
  pendingSlot = slotId;
  document.getElementById("mSign").classList.add("show");
  var inp = document.getElementById("iName");
  inp.focus();
  inp.select();
}

function closeModal(id){
  document.getElementById(id).classList.remove("show");
}

/* ====== ЗАПИСЬ ====== */
function doSign(){
  var name = document.getElementById("iName").value.trim();
  if(!name) return;
  if(!uid || !db){ alert("Подождите загрузки..."); return; }
  if(!pendingSlot) return;
  localStorage.setItem("fn", name);
  db.ref("bookings/" + pendingSlot + "/" + uid).set({
    name: name,
    t: firebase.database.ServerValue.TIMESTAMP
  });
  closeModal("mSign");
}

function cancel(slotId){
  if(!uid || !db) return;
  if(!confirm("Вы уверены, что хотите отменить запись на это занятие?")) return;
  db.ref("bookings/" + slotId + "/" + uid).remove();
}


/* ====== АДМИН-ДЕЙСТВИЯ ====== */
function adminRemove(slotId, targetUid){
  if(!isAdmin || !confirm("Удалить запись?")) return;
  db.ref("bookings/" + slotId + "/" + targetUid).remove();
}

function adminClear(slotId){
  if(!isAdmin || !confirm("Удалить ВСЕ записи?")) return;
  db.ref("bookings/" + slotId).remove();
}

/* ====== ИНИЦИАЛИЗАЦИЯ ====== */
document.getElementById("iName").value = localStorage.getItem("fn") || "";

// Закрытие модалок по клику на фон
["mSign","mAdmin"].forEach(function(id){
  document.getElementById(id).addEventListener("click", function(e){
    if(e.target === this) closeModal(id);
  });
});

// Enter в поле имени
document.getElementById("iName").addEventListener("keydown", function(e){
  if(e.key === "Enter") doSign();
});
document.getElementById("iCode").addEventListener("keydown", function(e){
  if(e.key === "Enter") tryAdmin();
});
</script>
</body>
</html>
