<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ИЗМЕНЕНИЕ: Заголовок вкладки -->
    <title>ФОРМА - расписание</title>
    
    <!-- Подключаем Firebase (используем совместимый режим для простоты) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* Основные стили */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#111827;color:#e5e7eb;min-height:100vh}

        /* ШАПКА */
        .header{display:flex;align-items:center;padding:12px 16px;background:#1f2937;position:sticky;top:0;z-index:50;gap:15px}
        
        /* ИЗМЕНЕНИЕ: Лого без рамок и фона */
        .logo img{height:40px;border:none!important;background:none!important;display:block}
        
        /* ИЗМЕНЕНИЕ: Название на странице */
        .header h1{flex:1;text-align:center;font-size:1.1em;font-weight:600;color:#fff;margin:0}

        .bell-wrap{position:relative;cursor:pointer;font-size:1.4em}
        .bell-badge{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;border-radius:50%;
                     min-width:18px;height:18px;font-size:11px;display:none;align-items:center;justify-content:center}
        .bell-badge.show{display:flex}

        /* СЕТКА */
        .container{display:flex;gap:16px;padding:16px;max-width:1100px;margin:auto}
        .schedule-col{flex:1;min-width:0}
        .calendar-col{width:280px;flex-shrink:0}
        @media(max-width:768px){.container{flex-direction:column-reverse}.calendar-col{width:100%}}

        /* НАВИГАЦИЯ ПО НЕДЕЛЯМ */
        .week-nav{display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:15px}
        /* ИЗМЕНЕНИЕ: Зеленые кнопки перемотки */
        .week-nav button{background:#22c55e;color:#fff;border:none;padding:8px 15px;border-radius:6px;cursor:pointer;font-weight:bold}
        .week-nav span{font-weight:600;min-width:120px;text-align:center}

        /* КАРТОЧКИ ЗАНЯТИЙ */
        .day-card{background:#1f2937;border-radius:12px;padding:15px;margin-bottom:15px}
        .day-title{color:#22c55e;font-weight:bold;margin-bottom:10px;text-transform:capitalize}
        .class-item{background:#111827;border-radius:10px;padding:12px;margin-bottom:8px}
        .cls-time{color:#22c55e;font-weight:bold;font-size:1.1em}
        .cls-name{font-size:1.05em;margin:4px 0;font-weight:500}
        .cls-trainer{color:#9ca3af;font-size:0.9em}
        .cls-slots{color:#6b7280;font-size:0.85em;margin:5px 0}
        
        /* КНОПКИ */
        .btn-book{background:#22c55e;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;width:100%;margin-top:5px}
        /* ИЗМЕНЕНИЕ: Кнопка резерва синяя */
        .btn-reserve{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;width:100%;margin-top:5px}
        
        /* ИЗМЕНЕНИЕ: Вы записаны + Х */
        .booked-row{display:flex;align-items:center;justify-content:space-between;background:#064e3b;padding:8px;border-radius:6px;margin-top:5px}
        .booked-text{color:#4ade80;font-weight:bold;font-size:0.9em}
        .btn-x{background:#ef4444;color:#fff;border:none;width:28px;height:28px;border-radius:4px;cursor:pointer;font-weight:bold}

        /* КАЛЕНДАРЬ */
        .calendar{background:#1f2937;border-radius:12px;padding:15px}
        .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .cal-head button{background:none;border:none;color:#22c55e;font-size:1.2em;cursor:pointer;padding:0 10px}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
        .cal-dn{font-size:0.75em;color:#6b7280;padding-bottom:5px}
        .cal-d{padding:8px 2px;font-size:0.9em;color:#4b5563;cursor:pointer;border-radius:4px}
        /* ИЗМЕНЕНИЕ: Белый цвет если есть занятия */
        .cal-d.has-classes{color:#ffffff;font-weight:bold}
        /* ИЗМЕНЕНИЕ: Сегодня — желтое подчеркивание */
        .cal-d.today{color:#eab308;border-bottom:3px solid #eab308;border-radius:0;font-weight:bold}

        /* МОДАЛЬНЫЕ ОКНА (стиль отмены) */
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;padding:20px}
        .overlay.open{display:flex}
        .modal{background:#1f2937;border:2px solid #ef4444;border-radius:15px;padding:20px;width:100%;max-width:350px;box-shadow:0 0 20px rgba(239,68,68,0.3)}
        .modal h3{text-align:center;margin-bottom:15px;font-size:1.1em}
        .modal input, .modal textarea{width:100%;padding:12px;margin-bottom:12px;border-radius:8px;border:1px solid #374151;background:#111827;color:#fff;font-size:1em}
        .m-btns{display:flex;gap:10px}
        .m-btns button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:bold}
        .m-ok{background:#22c55e;color:#fff}
        .m-no{background:#ef4444;color:#fff}

        /* ПАНЕЛЬ УВЕДОМЛЕНИЙ */
        .notif-panel{display:none;position:fixed;top:60px;right:16px;width:300px;background:#1f2937;border-radius:12px;padding:15px;z-index:90;box-shadow:0 10px 25px rgba(0,0,0,0.5)}
        .notif-panel.open{display:block}
        .notif-item{background:#111827;padding:10px;border-radius:8px;margin-bottom:8px;font-size:0.9em}

        /* АДМИНКА */
        .admin-box{display:none;background:#1f2937;margin:16px;padding:16px;border-radius:12px;max-width:1100px;margin:16px auto}
        .admin-box.open{display:block}
        .abtn-notify{background:#8b5cf6;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;margin-right:10px}
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><img src="logo.png" alt="Logo" onerror="this.style.display='none'"></div>
    <h1>ФОРМА — расписание</h1>
    <div class="bell-wrap" onclick="toggleNotifs()">🔔<div id="badge" class="bell-badge">0</div></div>
</div>

<div class="container">
    <div class="schedule-col">
        <div class="week-nav">
            <button onclick="changeWeek(-1)">❮</button>
            <span id="weekRange">...</span>
            <button onclick="changeWeek(1)">❯</button>
        </div>
        <div id="scheduleGrid"></div>
    </div>
    <div class="calendar-col">
        <div class="calendar" id="calendar"></div>
    </div>
</div>

<!-- Панель админа -->
<div id="adminPanel" class="admin-box">
    <h3 style="margin-bottom:15px">Админ-панель</h3>
    <button class="abtn-notify" onclick="openModal('mBroadcast')">📢 Уведомление</button>
    <button class="abtn-notify" style="background:#22c55e" onclick="openModal('mAddClass')">➕ Добавить</button>
</div>

<!-- МОДАЛКИ -->

<!-- Ввод Имени -->
<div class="overlay" id="mName">
    <div class="modal">
        <h3>Ваши имя и фамилия</h3>
        <input type="text" id="userName" placeholder="Имя и Фамилия">
        <div class="m-btns">
            <button class="m-ok" onclick="saveName()">Далее</button>
        </div>
    </div>
</div>

<!-- Ввод Телефона -->
<div class="overlay" id="mPhone">
    <div class="modal">
        <h3>Ваш телефон</h3>
        <input type="tel" id="userPhone" placeholder="+7 (999) 000-00-00">
        <div class="m-btns">
            <button class="m-ok" onclick="savePhone()">Завершить</button>
        </div>
    </div>
</div>

<!-- Подтверждение отмены -->
<div class="overlay" id="mCancel">
    <div class="modal">
        <h3>Отменить запись?</h3>
        <div class="m-btns">
            <button class="m-ok" onclick="confirmCancel()">Да, отменить</button>
            <button class="m-no" onclick="closeModal('mCancel')">Нет</button>
        </div>
    </div>
</div>

<!-- Рассылка админа -->
<div class="overlay" id="mBroadcast">
    <div class="modal">
        <h3>Новое уведомление всем</h3>
        <textarea id="bcText" placeholder="Введите текст..."></textarea>
        <div class="m-btns">
            <button class="m-ok" onclick="sendBroadcast()">Отправить</button>
            <button class="m-no" onclick="closeModal('mBroadcast')">Отмена</button>
        </div>
    </div>
</div>

<!-- Добавление занятия -->
<div class="overlay" id="mAddClass">
    <div class="modal">
        <h3>Добавить занятие</h3>
        <input type="date" id="newDate">
        <input type="time" id="newTime">
        <input type="text" id="newName" placeholder="Название">
        <input type="text" id="newTrainer" placeholder="Тренер">
        <input type="number" id="newMax" placeholder="Мест" value="10">
        <div class="m-btns">
            <button class="m-ok" onclick="addClass()">Создать</button>
            <button class="m-no" onclick="closeModal('mAddClass')">Отмена</button>
        </div>
    </div>
</div>

<div class="notif-panel" id="notifPanel">
    <h4 style="margin-bottom:10px">Уведомления</h4>
    <div id="notifList"></div>
</div>

<script>
// !!! ВСТАВЬ СВОИ ДАННЫЕ ОТ FIREBASE СЮДА !!!
const firebaseConfig = {
  apiKey:"AIzaSyCmJcDses0fO1s9E5ZoSSRhiEdCcEr3emI",
  authDomain:"forma-fit-zgr.firebaseapp.com",
  databaseURL:"https://forma-fit-zgr-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"forma-fit-zgr",
  storageBucket:"forma-fit-zgr.firebasestorage.app",
  messagingSenderId:"1091167121540",
  appId:"1:1091167121540:web:43f386e58ed6519472d2d1",
  measurementId:"G-PX9Z0G911P"
};
var ACODE="fit2024";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = JSON.parse(localStorage.getItem('fitness_user')) || null;
let currentWeekStart = getMonday(new Date());
let cancelTarget = null;

// Инициализация
window.onload = () => {
    renderWeek();
    loadCalendar();
    listenNotifs();
    checkPushReminders();
    if('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
};

// --- ВСПОМОГАТЕЛЬНОЕ ---
function getMonday(d) {
    d = new Date(d);
    let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1);
    return new Date(d.setDate(diff));
}
function formatDate(d) { return d.toISOString().split('T')[0]; }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// --- ПОЛЬЗОВАТЕЛЬ ---
function checkAuth(callback) {
    if (currentUser && currentUser.name && currentUser.phone) {
        callback();
    } else {
        openModal('mName');
        window.pendingAction = callback;
    }
}
function saveName() {
    const name = document.getElementById('userName').value.trim();
    if(!name) return;
    currentUser = { id: 'u' + Date.now(), name: name };
    closeModal('mName');
    openModal('mPhone');
}
function savePhone() {
    const phone = document.getElementById('userPhone').value.trim();
    if(!phone) return;
    currentUser.phone = phone;
    localStorage.setItem('fitness_user', JSON.stringify(currentUser));
    closeModal('mPhone');
    if(window.pendingAction) window.pendingAction();
}

// --- РАСПИСАНИЕ ---
function changeWeek(dir) {
    currentWeekStart.setDate(currentWeekStart.getDate() + (dir * 7));
    renderWeek();
}

function renderWeek() {
    const grid = document.getElementById('scheduleGrid');
    const rangeText = document.getElementById('weekRange');
    grid.innerHTML = '<p style="text-align:center; padding:20px;">Загрузка...</p>';
    
    let days = [];
    for(let i=0; i<7; i++) {
        let d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        days.push(formatDate(d));
    }
    
    rangeText.innerText = new Date(days[0]).toLocaleDateString('ru', {day:'numeric', month:'short'}) + ' — ' + 
                          new Date(days[6]).toLocaleDateString('ru', {day:'numeric', month:'short'});

    db.ref('schedule').on('value', snapshot => {
        const data = snapshot.val() || {};
        grid.innerHTML = '';
        
        days.forEach(dateStr => {
            const dayData = data[dateStr] || {};
            const d = new Date(dateStr);
            let html = `
                <div class="day-card">
                    <div class="day-title">${d.toLocaleDateString('ru', {weekday:'long', day:'numeric', month:'long'})}</div>
            `;
            
            const classes = Object.entries(dayData);
            if(classes.length === 0) {
                html += `<p style="color:#4b5563; font-size:0.9em">Нет занятий</p>`;
            } else {
                classes.sort((a,b) => a[1].time.localeCompare(b[1].time)).forEach(([id, c]) => {
                    const bookings = c.bookings ? Object.keys(c.bookings).length : 0;
                    const max = c.maxSlots || 10;
                    const isFull = bookings >= max;
                    const isMy = currentUser && c.bookings && c.bookings[currentUser.id];
                    
                    html += `
                        <div class="class-item">
                            <div class="cls-time">${c.time}</div>
                            <div class="cls-name">${c.name}</div>
                            <div class="cls-trainer">${c.trainer}</div>
                            <div class="cls-slots">Мест: ${bookings} / ${max}</div>
                    `;
                    
                    if(isMy) {
                        html += `
                            <div class="booked-row">
                                <span class="booked-text">✓ Вы записаны</span>
                                <button class="btn-x" onclick="askCancel('${dateStr}','${id}')">✕</button>
                            </div>`;
                    } else if(isFull) {
                        html += `<button class="btn-reserve" onclick="book('${dateStr}','${id}', true)">Добавить в резерв</button>`;
                    } else {
                        html += `<button class="btn-book" onclick="book('${dateStr}','${id}', false)">Записаться</button>`;
                    }
                    html += `</div>`;
                });
            }
            html += `</div>`;
            grid.innerHTML += html;
        });
    });
}

// --- ЗАПИСЬ ---
function book(date, id, isReserve) {
    checkAuth(() => {
        if(isReserve) {
            db.ref(`reserve/${date}/${id}/${currentUser.id}`).set({name: currentUser.name, phone: currentUser.phone});
            alert('Вы добавлены в резерв!');
        } else {
            db.ref(`schedule/${date}/${id}/bookings/${currentUser.id}`).set({name: currentUser.name, phone: currentUser.phone});
        }
    });
}

function askCancel(date, id) {
    cancelTarget = {date, id};
    openModal('mCancel');
}

function confirmCancel() {
    if(!cancelTarget) return;
    db.ref(`schedule/${cancelTarget.date}/${cancelTarget.id}/bookings/${currentUser.id}`).remove();
    closeModal('mCancel');
}

// --- КАЛЕНДАРЬ ---
function loadCalendar() {
    const cal = document.getElementById('calendar');
    const now = new Date();
    const todayStr = formatDate(now);
    
    db.ref('schedule').once('value', snapshot => {
        const data = snapshot.val() || {};
        const schedDates = Object.keys(data);
        
        let h = `<div class="cal-grid">`;
        ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(dn => h+=`<div class="cal-dn">${dn}</div>`);
        
        let firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        let lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        let offset = (firstDay.getDay() || 7) - 1;

        for(let i=0; i<offset; i++) h += `<div></div>`;
        for(let d=1; d<=lastDay.getDate(); d++) {
            let cur = new Date(now.getFullYear(), now.getMonth(), d);
            let s = formatDate(cur);
            let cls = 'cal-d';
            if(s === todayStr) cls += ' today';
            if(schedDates.includes(s)) cls += ' has-classes';
            h += `<div class="${cls}" onclick="jumpToDate('${s}')">${d}</div>`;
        }
        h += `</div>`;
        cal.innerHTML = h;
    });
}

function jumpToDate(s) {
    currentWeekStart = getMonday(new Date(s));
    renderWeek();
}

// --- УВЕДОМЛЕНИЯ ---
function toggleNotifs() {
    document.getElementById('notifPanel').classList.toggle('open');
    localStorage.setItem('lastReadNotif', Date.now());
    document.getElementById('badge').classList.remove('show');
}

function listenNotifs() {
    db.ref('broadcasts').on('value', snap => {
        const list = document.getElementById('notifList');
        const data = snap.val() || {};
        const items = Object.values(data).reverse();
        
        list.innerHTML = items.length ? '' : 'Нет новых уведомлений';
        items.forEach(m => {
            list.innerHTML += `<div class="notif-item">${m.text}</div>`;
        });

        const lastRead = localStorage.getItem('lastReadNotif') || 0;
        const newCount = items.filter(i => i.ts > lastRead).length;
        if(newCount > 0) {
            const b = document.getElementById('badge');
            b.innerText = newCount;
            b.classList.add('show');
        }
    });
}

// ПУШ-НАПОМИНАНИЯ (локальные имитации через браузер)
function checkPushReminders() {
    setInterval(() => {
        if(!currentUser) return;
        const now = new Date();
        const hr = now.getHours();
        const min = now.getMinutes();
        
        // В 10:00 каждое утро
        if(hr === 10 && min === 0) {
            db.ref('schedule/' + formatDate(now)).once('value', s => {
                const classes = s.val();
                if(classes) {
                    Object.values(classes).forEach(c => {
                        if(c.bookings && c.bookings[currentUser.id]) {
                            new Notification("ФОРМА", { body: "У вас сегодня занятие: " + c.name, silent: true });
                        }
                    });
                }
            });
        }
    }, 60000);
}

// --- АДМИН-ФУНКЦИИ ---
function sendBroadcast() {
    const text = document.getElementById('bcText').value;
    if(!text) return;
    db.ref('broadcasts').push({text: text, ts: Date.now()});
    closeModal('mBroadcast');
    document.getElementById('bcText').value = '';
}

function addClass() {
    const d = document.getElementById('newDate').value;
    const t = document.getElementById('newTime').value;
    const n = document.getElementById('newName').value;
    const tr = document.getElementById('newTrainer').value;
    const m = document.getElementById('newMax').value;
    if(!d || !t || !n) return;
    db.ref(`schedule/${d}`).push({time: t, name: n, trainer: tr, maxSlots: parseInt(m)});
    closeModal('mAddClass');
}

// Вход в админку: Ctrl + Shift + A
document.addEventListener('keydown', e => {
    if(e.ctrlKey && e.shiftKey && e.code === 'KeyA') {
        document.getElementById('adminPanel').classList.toggle('open');
    }
});
</script>

</body>
</html>
