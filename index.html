<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запись на фитнес</title>
<style>
:root{
  --bg:#f0f2f5;--c:#fff;--t:#333;--t2:#777;--t3:#aaa;
  --bd:#e0e0e0;--ip:#ddd;--g:#4caf50;--gh:#43a047;--r:#ef5350;
  --gbg:#e8f5e9;--gcl:#2e7d32;--abg:#fff3e0;--abd:#ffcc80;--acl:#e65100;
  --sh:0 2px 8px rgba(0,0,0,.08);--mb:#fff
}
[data-theme="dark"]{
  --bg:#121212;--c:#1e1e1e;--t:#e0e0e0;--t2:#aaa;--t3:#666;
  --bd:#333;--ip:#444;--g:#66bb6a;--gh:#4caf50;--r:#ef5350;
  --gbg:#1b3a1b;--gcl:#81c784;--abg:#3e2723;--abd:#5d4037;--acl:#ffab91;
  --sh:0 2px 8px rgba(0,0,0,.3);--mb:#252525
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--t);min-height:100vh;padding:16px;
  transition:background .3s,color .3s
}

/* TOP BAR */
.top{
  display:flex;justify-content:space-between;align-items:center;
  max-width:920px;margin:0 auto 14px;gap:8px
}
.hdr{flex:1;text-align:center;user-select:none}
.hdr h1{font-size:20px;cursor:default}
.badge{
  display:none;background:#ff9800;color:#fff;padding:2px 8px;
  border-radius:10px;font-size:10px;margin-top:4px
}
.cs{
  display:inline-block;font-size:10px;padding:2px 7px;
  border-radius:8px;margin-top:3px;color:#fff
}
.c-ok{background:#4caf50}
.c-er{background:#e53935}
.c-w{background:#ff9800}

.tbtn,.ibtn{
  background:var(--c);border:1px solid var(--ip);border-radius:50%;
  width:36px;height:36px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--sh);flex-shrink:0;position:relative;
  transition:transform .15s
}
.tbtn:hover,.ibtn:hover{transform:scale(1.05)}
.ibtn{display:none}
.ibtn.sh{display:flex}
.bdot{
  position:absolute;top:1px;right:1px;width:8px;height:8px;
  background:#e53935;border-radius:50%;display:none
}

/* LAYOUT */
.main{
  display:flex;gap:16px;max-width:920px;margin:0 auto;align-items:flex-start
}
.sw{flex:1;min-width:0}
.cw{flex-shrink:0;width:264px}

/* WEEK HEADER */
.shd{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;background:var(--c);border-radius:8px;
  margin-bottom:10px;box-shadow:var(--sh);font-size:12px;gap:6px
}
.shd .ds{font-weight:600;color:var(--g)}
.shd .sv{font-weight:600}
.wb{
  background:var(--bg);border:1px solid var(--ip);border-radius:5px;
  padding:2px 8px;cursor:pointer;font-size:16px;transition:background .2s
}
.wb:hover{background:var(--gbg)}
.dd{
  background:var(--g);color:#fff;border:none;border-radius:5px;
  padding:3px 10px;cursor:pointer;font-size:11px
}
.dd:hover{background:var(--gh)}

/* DAY BLOCK */
.dy{
  background:var(--c);border-radius:10px;padding:14px;
  margin-bottom:10px;box-shadow:var(--sh)
}
.dyhd{
  font-size:14px;font-weight:700;padding-bottom:6px;
  margin-bottom:8px;border-bottom:2px solid var(--g)
}
.dyhd .d2{font-weight:400;color:var(--t2);font-size:12px}
.nc{color:var(--t3);font-size:13px;padding:8px 0;text-align:center}

/* SLOT ROW */
.sl{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--bd);gap:6px;flex-wrap:wrap
}
.sl:last-child{border-bottom:none}
.sll{flex:1;min-width:140px}
.st{font-weight:600;font-size:13px}
.sn{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4}
.slr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ct{
  background:var(--gbg);color:var(--gcl);padding:3px 7px;
  border-radius:14px;font-size:11px;font-weight:600
}
.b{
  border:none;padding:5px 10px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:500;white-space:nowrap;transition:opacity .15s
}
.b:hover{opacity:.85}
.bg{background:var(--g);color:#fff}
.br{background:var(--r);color:#fff}
.bdel{
  background:none;color:var(--t3);border:none;cursor:pointer;
  font-size:13px;padding:1px 2px
}
.bdel:hover{color:var(--r)}
.bclr{
  background:var(--r);color:#fff;border:none;cursor:pointer;
  font-size:10px;padding:2px 5px;border-radius:3px;opacity:.7
}
.bclr:hover{opacity:1}

/* CALENDAR */
.cb{
  background:var(--c);border-radius:10px;padding:10px;
  box-shadow:var(--sh);margin-bottom:10px
}
.ch{font-size:12px;font-weight:700;text-align:center;margin-bottom:6px}
.ctbl{width:100%;border-collapse:collapse;font-size:11px}
.ctbl th{
  padding:2px 0;text-align:center;color:var(--t3);
  font-weight:500;font-size:10px
}
.ctbl td{padding:2px 0;text-align:center}
.cd{
  width:26px;height:26px;line-height:26px;border-radius:50%;
  display:inline-block;cursor:pointer;transition:all .15s
}
.cd.oy{color:var(--t3)}
.cd.oy:hover{background:var(--bd)}
.cd.soy{color:var(--t3);font-weight:700}
.cd.td{background:var(--g);color:#fff;font-weight:700}
.cd.bo{border:2px solid var(--g);color:var(--g);font-weight:600}
.cd.gh{color:var(--ip);cursor:default}

/* MODALS */
.mo{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center
}
.mo.sh{display:flex}
.mx{
  background:var(--mb);padding:20px;border-radius:12px;
  width:92%;max-width:320px;max-height:90vh;overflow-y:auto
}
.mx h3{margin-bottom:10px;font-size:15px}
.mx input,.mx textarea{
  width:100%;padding:9px;border:2px solid var(--ip);border-radius:6px;
  font-size:13px;outline:none;background:var(--c);color:var(--t);
  margin-bottom:7px;font-family:inherit
}
.mx input:focus,.mx textarea:focus{border-color:var(--g)}
.mx .bo{
  width:100%;padding:10px;background:var(--g);color:#fff;
  border:none;border-radius:6px;font-size:13px;cursor:pointer;margin-top:4px
}
.mx .bo:hover{background:var(--gh)}

/* ADMIN PANEL */
.ap{
  background:var(--abg);border:1px solid var(--abd);border-radius:10px;
  padding:12px;margin-top:14px;display:none;max-width:920px;
  margin-left:auto;margin-right:auto
}
.ap h3{color:var(--acl);margin-bottom:6px;font-size:13px}
.ar{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.ab{
  padding:6px 10px;background:var(--g);color:#fff;border:none;
  border-radius:6px;cursor:pointer;font-size:11px
}
.ab:hover{opacity:.85}
.ab.d{background:var(--r)}
.ab.w{background:#ff9800;color:#fff}

/* EDITOR TABLE */
.et{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.et th{
  background:var(--abg);padding:5px;text-align:left;
  color:var(--acl);font-size:10px
}
.et td{padding:4px;border-bottom:1px solid var(--bd)}
.et input{
  width:100%;padding:4px;border:1px solid var(--ip);border-radius:3px;
  font-size:11px;background:var(--c);color:var(--t);font-family:inherit
}
.et input:focus{border-color:var(--g)}

/* NOTIFICATION LIST */
.nl{max-height:300px;overflow-y:auto;font-size:12px;color:var(--t2)}
.ni{padding:8px 0;border-bottom:1px solid var(--bd)}
.ni:last-child{border-bottom:none}
.ni .nm{font-weight:600;color:var(--t)}
.ni .nt{font-size:10px;color:var(--t3);margin-top:2px}

/* FLASH ANIMATION */
@keyframes flashG{0%{background:var(--gbg)}100%{background:var(--c)}}
.flash{animation:flashG 1.2s ease-out}

/* RESPONSIVE */
@media(max-width:700px){
  .main{flex-direction:column;align-items:center}
  .cw{width:100%;max-width:320px}
  .sl{flex-direction:column;align-items:flex-start}
  .slr{align-self:flex-end}
  .mx{max-width:95%;padding:16px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top">
  <div class="hdr">
    <h1 onclick="tapA()">Запись на занятия</h1>
    <div class="badge" id="badge">Администратор</div>
    <div id="cs" class="cs c-w">...</div>
  </div>
  <button class="ibtn" id="iBtn" onclick="showNM()" title="Уведомления">
    &#128276;<span class="bdot" id="bdot"></span>
  </button>
  <button class="tbtn" onclick="togT()" id="tBtn" title="Тема">&#127763;</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="sw">
    <div id="shd"></div>
    <div id="sc"></div>
  </div>
  <div class="cw">
    <div id="cal"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="ap" id="ap">
  <h3>Панель администратора</h3>
  <div class="ar">
    <button class="ab w" onclick="openSE()">Расписание</button>
    <button class="ab d" onclick="exA()">Выйти</button>
  </div>
</div>

<!-- MODAL: booking (first time) -->
<div class="mo" id="mS">
  <div class="mx">
    <h3>Запись на занятие</h3>
    <input type="text" id="iN" placeholder="Ваше имя" maxlength="30">
    <input type="tel" id="iP" placeholder="Телефон" maxlength="20">
    <button class="bo" onclick="doSg()">Записаться</button>
  </div>
</div>

<!-- MODAL: admin code -->
<div class="mo" id="mA">
  <div class="mx">
    <h3>Код администратора</h3>
    <input type="password" id="iC" placeholder="Введите код">
    <button class="bo" onclick="tryA()">Подтвердить</button>
  </div>
</div>

<!-- MODAL: schedule editor -->
<div class="mo" id="mE">
  <div class="mx" style="max-width:560px;max-height:90vh;display:flex;flex-direction:column">
    <h3>Редактор расписания</h3>
    <div style="display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-shrink:0">
      <button class="b bg" onclick="pW()">&#9664;</button>
      <input type="date" id="wP" style="flex:1;margin:0;min-width:0">
      <button class="b bg" onclick="nW()">&#9654;</button>
      <button class="b bg" onclick="ldE()">Загрузить</button>
    </div>
    <div style="flex:1;overflow-y:auto;min-height:0">
      <div id="eB"></div>
    </div>
    <div style="flex-shrink:0;display:flex;gap:5px;margin-top:8px;flex-wrap:wrap">
      <button class="b bg" onclick="svW()">&#128190; Сохранить</button>
      <button class="b" style="background:#ff9800;color:#fff" onclick="cpP()">&#128203; С прошлой</button>
      <button class="b br" onclick="clW()">&#128465; Очистить</button>
      <button class="b" style="background:#9e9e9e;color:#fff" onclick="clMo('mE')">Закрыть</button>
    </div>
  </div>
</div>

<!-- MODAL: notifications -->
<div class="mo" id="mN">
  <div class="mx">
    <h3>Уведомления</h3>
    <div id="nL" class="nl"></div>
    <button class="bo" onclick="clMo('mN')" style="margin-top:10px">Закрыть</button>
  </div>
</div>

<!-- MODAL: confirm -->
<div class="mo" id="mD">
  <div class="mx">
    <div id="dTx" style="margin-bottom:10px;font-size:14px"></div>
    <div style="display:flex;gap:8px">
      <button class="bo" id="dOk" style="flex:1">Да</button>
      <button class="bo" id="dNo" style="flex:1;background:#9e9e9e">Нет</button>
    </div>
  </div>
</div>

<!-- MODAL: alert -->
<div class="mo" id="mL">
  <div class="mx">
    <div id="lTx" style="margin-bottom:10px;font-size:14px"></div>
    <button class="bo" id="lOk">OK</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
console.log("=== APP START ===");

/* ========== CONFIG ========== */
var FC={
  apiKey:"AIzaSyCmJcDses0fO1s9E5ZoSSRhiEdCcEr3emI",
  authDomain:"forma-fit-zgr.firebaseapp.com",
  databaseURL:"https://forma-fit-zgr-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"forma-fit-zgr",
  storageBucket:"forma-fit-zgr.firebasestorage.app",
  messagingSenderId:"1091167121540",
  appId:"1:1091167121540:web:43f386e58ed6519472d2d1",
  measurementId:"G-PX9Z0G911P"
};
var ACODE="fit2024";

/* ========== DEFAULT SCHEDULE ========== */
var DEF=[
  {day:"Понедельник",dow:1,cls:[
    {id:"m1",time:"09:00",name:"Йога",max:15},
    {id:"m2",time:"18:00",name:"Фитнес",max:20},
    {id:"m3",time:"19:30",name:"Бокс",max:12}
  ]},
  {day:"Вторник",dow:2,cls:[]},
  {day:"Среда",dow:3,cls:[
    {id:"w1",time:"09:00",name:"Йога",max:15},
    {id:"w2",time:"12:00",name:"Стретчинг",max:10},
    {id:"w3",time:"18:00",name:"Фитнес",max:20}
  ]},
  {day:"Четверг",dow:4,cls:[]},
  {day:"Пятница",dow:5,cls:[
    {id:"f1",time:"09:00",name:"Йога",max:15},
    {id:"f2",time:"17:00",name:"Танцы",max:15}
  ]},
  {day:"Суббота",dow:6,cls:[]},
  {day:"Воскресенье",dow:7,cls:[]}
];

/* ========== GLOBALS ========== */
var uid=null;
var isA=false;
var bk={};
var db=null;
var wC={};
var nwS=new Set();
var alerts=[];
var tod=new Date();
var vd=new Date(tod);
var sm='w';
var edD=null;
var edSch=[];
var pS=null;

/* ========== HELPERS ========== */
function $(i){return document.getElementById(i)}
function E(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function S2(n){return n<10?"0"+n:""+n}
function Fd(d){
  return d.getFullYear()+"-"+S2(d.getMonth()+1)+"-"+S2(d.getDate())
}
function PD(s){return new Date(s+"T00:00:00")}
function gM(d){
  var r=new Date(d),w=r.getDay();
  r.setDate(r.getDate()-((w+6)%7));
  r.setHours(0,0,0,0);
  return r
}
function wK(d){return Fd(gM(d))}

var RN=["Январь","Февраль","Март","Апрель","Май","Июнь",
        "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
var DL=["Воскресенье","Понедельник","Вторник","Среда",
        "Четверг","Пятница","Суббота"];

console.log("Helpers OK, today:", Fd(tod));

/* ========== SEED DEFAULT WEEKS ========== */
(function seed(){
  try {
    var mon=gM(tod);
    // 4 weeks before + 8 weeks after
    for(var i=-4;i<8;i++){
      var d=new Date(mon);
      d.setDate(d.getDate()+i*7);
      var k=Fd(d);
      wC[k]=DEF.map(function(x){
        return{
          day:x.day,dow:x.dow,
          cls:x.cls.map(function(c){
            return{id:c.id,time:c.time,name:c.name,max:c.max}
          })
        }
      });
    }
    console.log("Seed OK, weeks:", Object.keys(wC).length);
  } catch(e){console.error("Seed error:",e)}
})();

/* ========== THEME ========== */
(function(){
  if(localStorage.getItem("th")==="d")
    document.documentElement.setAttribute("data-theme","dark")
})();

function aTB(){
  $("tBtn").textContent=
    document.documentElement.hasAttribute("data-theme")?"\u2600\uFE0F":"\uD83C\uDF19"
}

function togT(){
  var d=document.documentElement.hasAttribute("data-theme");
  if(d){
    document.documentElement.removeAttribute("data-theme");
    localStorage.setItem("th","l")
  } else {
    document.documentElement.setAttribute("data-theme","dark");
    localStorage.setItem("th","d")
  }
  aTB()
}
aTB();

/* ========== WEEK DATA ========== */
function ldWk(d,cb){
  var k=wK(d);
  if(nwS.has(k)){if(cb)cb();return}
  if(!db){if(cb)cb();return}
  db.ref("weekOverrides/"+k).once("value",function(s){
    var o=s.val();
    if(o){
      nwS.add(k);
      wC[k]=DEF.map(function(di,i){
        return{
          day:di.day,dow:di.dow,
          cls:o[i]&&o[i].cls?o[i].cls.slice():[]
        }
      });
    }
    if(cb)cb()
  },function(){
    console.warn("Cannot read week:",k);
    if(cb)cb()
  })
}

function gWC(d){
  var k=wK(d);
  if(!wC[k])return null;
  var dt=PD(k);
  return wC[k].map(function(di,i){
    var cd=new Date(dt);cd.setDate(cd.getDate()+i);
    return{day:di.day,dow:di.dow,date:Fd(cd),cls:di.cls.slice()}
  })
}

function gCD(week,ds){
  if(!week)return null;
  for(var i=0;i<week.length;i++)if(week[i].date===ds)return week[i];
  return null
}

function hW(d){return nwS.has(wK(d))}

console.log("Week functions OK");

/* ========== RENDER ========== */
function render(){
  try{rCal()}catch(e){console.error("rCal error:",e)}
  try{rSch()}catch(e){console.error("rSch error:",e)}
  if(uid)$("iBtn").classList.add("sh");
  else $("iBtn").classList.remove("sh")
}

/* Calendar */
function rCal(){
  var h=bMo(tod.getFullYear(),tod.getMonth());
  var nm=tod.getMonth()===11?
    {y:tod.getFullYear()+1,m:0}:
    {y:tod.getFullYear(),m:tod.getMonth()+1};
  h+=bMo(nm.y,nm.m);
  $("cal").innerHTML=h
}

function bMo(y,m){
  var fi=new Date(y,m,1);
  var st=1-((fi.getDay()+6)%7);
  var ts=Fd(tod);

  var h='<div class="cb"><div class="ch">'+RN[m]+" "+y+'</div>';
  h+='<table class="ctbl"><tr>';
  var dayNames=["\u041F\u043D","\u0412\u0442","\u0421\u0440",
                "\u0427\u0442","\u041F\u0442","\u0421\u0431","\u0412\u0441"];
  for(var dn=0;dn<7;dn++)h+="<th>"+dayNames[dn]+"</th>";
  h+="</tr>";

  var cur=new Date(y,m,st);
  for(var ww=0;ww<6;ww++){
    h+="<tr>";
    for(var dd=0;dd<7;dd++){
      var ds=Fd(cur);
      var cm=cur.getMonth()===m;
      var cs=cur.getDay()>=1&&cur.getDay()<=5;
      var isT=ds===ts;
      var wb=cm&&hB(ds);
      var hs=cm&&hW(cur);
      var isS=sm==="d"&&ds===Fd(vd);

      h+="<td>";
      if(cm){
        var c="cd";
        if(isT)c+=" td";
        else if(wb)c+=" bo";
        else if(isS)c+=" soy";
        if(!hs&&cs&&!isT&&!wb)c+=" gh";
        else if(!isT&&!wb&&!isS)c+=" oy";
        h+='<span class="'+c+'" data-d="'+ds+'">'+cur.getDate()+"</span>"
      }
      h+="</td>";
      cur.setDate(cur.getDate()+1)
    }
    h+="</tr>"
  }
  h+="</table></div>";
  return h
}

function hB(ds){
  var week=gWC(PD(ds));
  if(!week)return false;
  for(var i=0;i<week.length;i++){
    if(week[i].date===ds){
      for(var j=0;j<week[i].cls.length;j++){
        var sid=week[i].cls[j].id+"_"+ds;
        if(bk[sid]&&bk[sid][uid])return true
      }
    }
  }
  return false
}

/* Schedule */
function rSch(){
  var h=rShd();
  if(sm==="d"){
    h+=rDay(Fd(vd))
  } else {
    var week=gWC(vd);
    if(week){
      for(var i=0;i<week.length;i++)h+=rDD(week[i])
    } else {
      h+='<div class="nc">Нет данных</div>'
    }
  }
  $("sc").innerHTML=h
}

function rShd(){
  var h='<div class="shd">';
  if(sm==="d"){
    var dd=PD(Fd(vd));
    h+='<span class="ds">'+DL[dd.getDay()]+", "+Fd(vd).split("-").reverse().join(".")+"</span>";
    h+='<button class="dd" onclick="sW()">\u2190 \u0412\u0441\u044F \u043D\u0435\u0434\u0435\u043B\u044F</button>'

    h+='<button class="wb" onclick="nvg(7)">&#9654;</button>'
  }

}

function rDay(ds){
  var week=gWC(PD(ds));
  if(!week)return'<div class="nc">Нет данных</div>';
  var day=gCD(week,ds);
  if(!day)return'<div class="nc">Нет данных</div>';
  return rDD(day)
}

function rDD(day){
  var dd=PD(day.date);
  var dn=DL[dd.getDay()];
  var dateStr=day.date.split("-").reverse().join(".");

  var h='<div class="dy">';
  h+='<div class="dyhd">'+E(dn)+' <span class="d2">('+dateStr+')</span></div>';

  if(!day.cls.length){
    h+='<div class="nc">\u0417\u0430\u043D\u044F\u0442\u0438\u0439 \u043D\u0435\u0442</div>'
  } else {
    for(var i=0;i<day.cls.length;i++){
      h+=rSl(day.cls[i],day.date)
    }
  }
  h+="</div>";
  return h
}

function rSl(s,ds){
  var sid=s.id+"_"+ds;
  var e=bk[sid]||{};
  var ls=[];
  for(var k in e)if(e.hasOwnProperty(k)){
    ls.push({u:k,n:e[k].name,p:e[k].phone||""})
  }
  var mi=uid&&e[uid];
  var fu=ls.length>=s.max;

  var h='<div class="sl"><div class="sll">';
  h+='<div class="st">'+E(s.time)+" \u2014 "+E(s.name)+"</div>";
  h+='<div class="sn">';

  if(ls.length){
    h+="\uD83D\uDC65 ";
    for(var i=0;i<ls.length;i++){
      if(i>0)h+=", ";
      h+=E(ls[i].n);
      if(ls[i].p)h+=" ("+E(ls[i].p)+")";
      if(isA)h+=' <button class="bdel" data-a="ar" data-s="'+sid+'" data-u="'+ls[i].u+'">&#10005;</button>'
    }
  } else {
    h+="\u041F\u043E\u043A\u0430 \u043D\u0438\u043A\u0442\u043E \u043D\u0435 \u0437\u0430\u043F\u0438\u0441\u0430\u043B\u0441\u044F"
  }

  h+='</div></div><div class="slr">';
  h+='<span class="ct">'+ls.length+"/"+s.max+"</span>";

  if(uid&&mi){
    h+='<button class="b br" data-a="ca" data-s="'+sid+'">\u041E\u0442\u043C\u0435\u043D\u0430</button>'
  } else if(!fu){
    h+='<button class="b bg" data-a="sg" data-s="'+sid+'">\uD83D\uDE4B \u0417\u0430\u043F\u0438\u0441\u0430\u0442\u044C\u0441\u044F</button>'
  } else {
    h+='<span style="color:var(--r);font-size:10px">\u041C\u0435\u0441\u0442 \u043D\u0435\u0442</span>'
  }

  if(isA&&ls.length){
    h+='<button class="bclr" data-a="ac" data-s="'+sid+'">\u041E\u0447\u0438\u0441\u0442\u0438\u0442\u044C</button>'
  }
  h+="</div></div>";
  return h
}

function ldE(){

function rET(){
  var h='<table class="et"><tr>';
  h+='<th style="width:80px">\u0414\u0435\u043D\u044C</th>';
  h+='<th>\u0412\u0440\u0435\u043C\u044F</th>';

  h+='<th style="width:50px">\u041C\u0430\u043A\u0441</th>';

      h+='<td style="font-weight:600;vertical-align:top;padding-top:5px">';

      h+='</td>';
      h+='<td><input type="time" data-d="'+di+'" data-c="'+ci+'" data-f="time" value="'+s.time+'"></td>';
      h+='<td><input type="text" data-d="'+di+'" data-c="'+ci+'" data-f="name" value="'+E(s.name)+'"></td>';
      h+='<td><input type="number" data-d="'+di+'" data-c="'+ci+'" data-f="max" value="'+s.max+'" min="1" max="99"></td>';
      h+='<td><button class="bdel" data-a="dc" data-d="'+di+'" data-c="'+ci+'" style="font-size:14px">&#10005;</button></td>';
      h+='</tr>'

  }
  h+='</table>';
  $("eB").innerHTML=h
}

function svE(){

  for(var i=0;i<ins.length;i++){
    var inp=ins[i];
    var di=+inp.dataset.d;
    var ci=+inp.dataset.c;
    var f=inp.dataset.f;
    if(edSch[di]&&edSch[di].cls[ci]){
      edSch[di].cls[ci][f]=f==="max"?Math.max(1,+inp.value||10):inp.value
    }
  }
}

function cpP(){

    var prev=wC[pk];

/* ========== BOOKING ========== */
function openSg(sid){
  var fn=localStorage.getItem("fn");
  var fp=localStorage.getItem("fp");

  if(fn&&fp&&uid&&db){
    // Known user -> 1-click
    if(bk[sid]&&bk[sid][uid]){sAl("\u0412\u044B \u0443\u0436\u0435 \u0437\u0430\u043F\u0438\u0441\u0430\u043D\u044B!");return}
    db.ref("bookings/"+sid+"/"+uid).set({
      name:fn,phone:fp,t:firebase.database.ServerValue.TIMESTAMP
    });
    // Flash animation
    var el=document.querySelector('[data-s="'+sid+'"][data-a="sg"]');
    if(el){
      var parent=el.closest(".sl");
      if(parent){
        parent.classList.add("flash");
        setTimeout(function(){parent.classList.remove("flash")},1200)
      }
    }
  } else {
    // First time -> show modal
    pS=sid;
    $("iN").value=fn||"";
    $("iP").value=fp||"";
    opMo("mS")
  }
}

function doSg(){
  var n=$("iN").value.trim();
  var p=$("iP").value.trim();
  if(!n){sAl("\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0438\u043C\u044F");return}
  if(!uid||!db){sAl("\u041F\u043E\u0434\u043E\u0436\u0434\u0438\u0442\u0435 \u0437\u0430\u0433\u0440\u0443\u0437\u043A\u0438...");return}
  if(!pS)return;
  if(bk[pS]&&bk[pS][uid]){sAl("\u0412\u044B \u0443\u0436\u0435 \u0437\u0430\u043F\u0438\u0441\u0430\u043D\u044B!");clMo("mS");return}
  localStorage.setItem("fn",n);
  localStorage.setItem("fp",p);
  db.ref("bookings/"+pS+"/"+uid).set({
    name:n,phone:p,t:firebase.database.ServerValue.TIMESTAMP
  });
  clMo("mS")
}

function doCa(sid){
  if(!uid||!db)return;

/* ========== NOTIFICATIONS ========== */
function aAl(msg){
  if(alerts.length&&alerts[alerts.length-1].message===msg)return;
  alerts.push({message:msg,time:Date.now()});
  $("bdot").style.display="block"
}

function showNM(){
  var h="";
  if(!alerts.length){
    h='<div class="nc">\u041D\u0435\u0442 \u0443\u0432\u0435\u0434\u043E\u043C\u043B\u0435\u043D\u0438\u0439</div>'
  } else {
    var rev=alerts.slice().reverse();
    for(var i=0;i<rev.length;i++){
      h+='<div class="ni"><div class="nm">'+E(rev[i].message)+'</div>';
      h+='<div class="nt">'+new Date(rev[i].time).toLocaleString("ru")+'</div></div>'
    }
  }
  $("nL").innerHTML=h;opMo("mN");
  $("bdot").style.display="none"
}

function sBN(title,body){
  if(Notification&&Notification.permission==="granted"){
    try{new Notification(title,{body:body})}catch(e){}
  }
}

function cNtf(){
  var now=new Date();
  var ds=Fd(now);
  var week=gWC(now);
  if(!week)return;

  var ns=JSON.parse(localStorage.getItem("ns")||"{}");
  var tb=[];

  for(var di=0;di<week.length;di++){
    if(week[di].date===ds){
      for(var ci=0;ci<week[di].cls.length;ci++){
        var s=week[di].cls[ci];
        var sid=s.id+"_"+ds;
        if(bk[sid]&&bk[sid][uid])tb.push(s)
      }
    }
  }
  if(!tb.length)return;

  // 9:00 morning reminder
  if(now.getHours()===9&&now.getMinutes()<2){
    var k="m9_"+ds;
    if(!ns[k]){
      ns[k]=1;localStorage.setItem("ns",JSON.stringify(ns));
      var tx="\u0421\u0435\u0433\u043E\u0434\u043D\u044F "+tb.length+" \u0437\u0430\u043D\u044F\u0442\u0438\u0439";
      aAl(tx);sBN("\u041D\u0430\u043F\u043E\u043C\u0438\u043D\u0430\u043D\u0438\u0435",tx)
    }
  }

  // 2 hours before each class
  for(var ti=0;ti<tb.length;ti++){
    var s=tb[ti];
    var tp=s.time.split(":");
    var cl=new Date(now);
    cl.setHours(+tp[0],+tp[1],0,0);
    var mB=(cl-now)/60000;
    if(mB>=119.5&&mB<=120.5){
      var k="m2h_"+s.id+"_"+ds;
      if(!ns[k]){
        ns[k]=1;localStorage.setItem("ns",JSON.stringify(ns));
        var tx="\u0427\u0435\u0440\u0435\u0437 2\u0447: "+s.time+" "+s.name;
        aAl(tx);sBN(s.time+" "+s.name,"\u0417\u0430\u043D\u044F\u0442\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 2 \u0447\u0430\u0441\u0430!")
      }
    }
  }
}
