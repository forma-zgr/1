<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запись на фитнес</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
  h1 { text-align: center; color: #333; margin-bottom: 20px; }
  .day { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .day-title { font-size: 18px; font-weight: bold; color: #555; margin-bottom: 12px; }
  .slot { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
  .slot:last-child { border-bottom: none; }
  .slot-time { font-weight: 600; color: #333; }
  .slot-name { color: #777; font-size: 14px; }
  .slot-info { display: flex; align-items: center; gap: 12px; }
  .count { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 20px; font-size: 14px; }
  .btn { background: #4caf50; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .btn:hover { background: #43a047; }
  .btn.cancel { background: #ef5350; }
  .btn.cancel:hover { background: #e53935; }
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
  .modal.show { display: flex; }
  .modal-content { background: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 320px; }
  .modal-content input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 16px; }
  .modal-content button { width: 100%; padding: 12px; background: #4caf50; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .names { font-size: 12px; color: #999; margin-top: 4px; }
</style>
</head>
<body>

<h1>🏋️ Запись на занятия</h1>
<div id="schedule"></div>

<!-- Модальное окно для ввода имени -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px">Как вас зовут?</h3>
    <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="30">
    <button onclick="confirmSignup()">Записаться ✓</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ⚙️ Вставьте свои данные из Firebase Console
const firebaseConfig = {
  apiKey: "AIzaSyCmJcDses0fO1s9E5ZoSSRhiEdCcEr3emI",
  authDomain: "forma-fit-zgr.firebaseapp.com",
  databaseURL: "https://forma-fit-zgr-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "forma-fit-zgr",
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 📅 Расписание (можно менять под себя)
const schedule = [
  {
    day: "Понедельник",
    classes: [
      { id: "mon_yoga", time: "09:00", name: "Йога", max: 15 },
      { id: "mon_fit", time: "18:00", name: "Фитнес", max: 20 },
      { id: "mon_box", time: "19:30", name: "Бокс", max: 12 },
    ]
  },
  {
    day: "Среда",
    classes: [
      { id: "wed_yoga", time: "09:00", name: "Йога", max: 15 },
      { id: "wed_stretch", time: "12:00", name: "Стретчинг", max: 10 },
      { id: "wed_fit", time: "18:00", name: "Фитнес", max: 20 },
    ]
  },
  {
    day: "Пятница",
    classes: [
      { id: "fri_yoga", time: "09:00", name: "Йога", max: 15 },
      { id: "fri_dance", time: "17:00", name: "Танцы", max: 15 },
    ]
  },
];

let currentSlot = null;

function render(data) {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  schedule.forEach(day => {
    const dayEl = document.createElement("div");
    dayEl.className = "day";
    dayEl.innerHTML = `<div class="day-title">${day.day}</div>`;

    day.classes.forEach(slot => {
      const signed = data?.[slot.id] || {};
      const entries = Object.entries(signed);
      const names = entries.map(([_, v]) => v.name);
      const myId = localStorage.getItem("myId");
      const isSigned = signed[myId];

      const slotEl = document.createElement("div");
      slotEl.className = "slot";
      slotEl.innerHTML = `
        <div>
          <div class="slot-time">${slot.time} — ${slot.name}</div>
          <div class="names">${names.length ? "👥 " + names.join(", ") : "Пока никто не записался"}</div>
        </div>
        <div class="slot-info">
          <span class="count">${names.length}/${slot.max}</span>
          ${isSigned
            ? `<button class="btn cancel" onclick="cancel('${slot.id}')">Отмена</button>`
            : `<button class="btn" onclick="openModal('${slot.id}')">Записаться 🙋</button>`
          }
        </div>
      `;
      dayEl.appendChild(slotEl);
    });

    container.appendChild(dayEl);
  });
}

function openModal(slotId) {
  currentSlot = slotId;
  document.getElementById("modal").classList.add("show");
  document.getElementById("nameInput").focus();
}

function confirmSignup() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  
  let myId = localStorage.getItem("myId");
  if (!myId) {
    myId = "u_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
    localStorage.setItem("myId", myId);
  }
  localStorage.setItem("myName", name);

  db.ref("bookings/" + currentSlot + "/" + myId).set({ name, time: Date.now() });
  document.getElementById("modal").classList.remove("show");
}

function cancel(slotId) {
  const myId = localStorage.getItem("myId");
  if (myId) db.ref("bookings/" + slotId + "/" + myId).remove();
}

// Загрузка сохранённого имени
document.getElementById("nameInput").value = localStorage.getItem("myName") || "";

// Слушаем изменения в реальном времени
db.ref("bookings").on("value", snap => render(snap.val()));
</script>
</body>
</html>
