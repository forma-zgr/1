<html lang="ru">

<style>
:root{--bg:#f0f2f5;--c:#fff;--t:#333;--t2:#777;--t3:#aaa;--bd:#e0e0e0;--ip:#ddd;--g:#4caf50;--gh:#43a047;--r:#ef5350;--gbg:#e8f5e9;--gcl:#2e7d32;--abg:#fff3e0;--abd:#ffcc80;--acl:#e65100;--sh:0 2px 8px rgba(0,0,0,.08);--mb:#fff;--blue:#2196f3;--icon:#555}
[data-theme="dark"]{--bg:#121212;--c:#1e1e1e;--t:#e0e0e0;--t2:#aaa;--t3:#666;--bd:#333;--ip:#444;--g:#66bb6a;--gh:#4caf50;--r:#ef5350;--gbg:#1b3a1b;--gcl:#81c784;--abg:#3e2723;--abd:#5d4037;--acl:#ffab91;--sh:0 2px 8px rgba(0,0,0,.3);--mb:#252525;--blue:#64b5f6;--icon:#ffc107}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding:16px;transition:background .3s,color .3s}

.top{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto 14px;gap:8px;flex-wrap:wrap}
.hdr{flex:1;text-align:center;user-select:none;min-width:120px}
.hdr h1{font-size:20px;cursor:pointer}
.uinfo{display:flex;align-items:center;gap:6px;flex-shrink:0}
.uinfo .uname,.uinfo .uphone{background:var(--c);border:1px solid var(--ip);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;box-shadow:var(--sh);color:var(--g);font-weight:500;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uinfo .uname:hover,.uinfo .uphone:hover{background:var(--gbg)}
.badge{display:none;background:#ff9800;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;margin-top:4px}
.cs{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin-top:3px;color:#fff}
.c-ok{background:#4caf50}.c-er{background:#e53935}.c-w{background:#ff9800}
.tbtn,.ibtn{background:var(--c);border:1px solid var(--ip);border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);flex-shrink:0;position:relative;transition:transform .15s;color:var(--icon)}
.tbtn:hover,.ibtn:hover{transform:scale(1.05)}.ibtn{display:none}.ibtn.sh{display:flex}
.bdot{position:absolute;top:1px;right:1px;width:8px;height:8px;background:#e53935;border-radius:50%;display:none}

.main{display:flex;gap:16px;max-width:960px;margin:0 auto;align-items:flex-start}
.lside{flex-shrink:0;width:200px;text-align:center}
.lside img{width:200px;height:200px;object-fit:contain;border:none;background:none;box-shadow:none}
.sw{flex:1;min-width:0}.cw{flex-shrink:0;width:264px}

.shd{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--c);border-radius:8px;margin-bottom:10px;box-shadow:var(--sh);font-size:12px;gap:6px}
.shd .ds{font-weight:600;color:var(--g)}.shd .sv{font-weight:600}
.wb{background:var(--g);color:#fff;border:none;border-radius:5px;padding:2px 8px;cursor:pointer;font-size:16px;transition:opacity .15s}
.wb:hover{opacity:.85}
.rdd{background:var(--g);color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:11px}

.dy{background:var(--c);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.dyhd{font-size:14px;font-weight:700;padding-bottom:6px;margin-bottom:8px;border-bottom:2px solid var(--g)}
.dyhd .d2{font-weight:400;color:var(--t2);font-size:12px}
.nc{color:var(--t3);font-size:13px;padding:8px 0;text-align:center}

.sl{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd);gap:6px;flex-wrap:wrap}.sl:last-child{border-bottom:none}
.sll{flex:1;min-width:140px}.st{font-weight:600;font-size:13px}
.sn{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4}
.slr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ct{background:var(--gbg);color:var(--gcl);padding:3px 7px;border-radius:14px;font-size:11px;font-weight:600}
.b{border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;transition:opacity .15s}.b:hover{opacity:.85}
.bg{background:var(--g);color:#fff}.br{background:var(--r);color:#fff}
.b-blue{background:var(--blue);color:#fff}
.bdel{background:none;color:var(--t3);border:none;cursor:pointer;font-size:13px;padding:1px 2px}.bdel:hover{color:var(--r)}
.bclr{background:var(--r);color:#fff;border:none;cursor:pointer;font-size:10px;padding:2px 5px;border-radius:3px;opacity:.7}.bclr:hover{opacity:1}
.phone-icon{cursor:pointer;margin-left:4px;font-size:10px;opacity:0.6}.phone-icon:hover{opacity:1}

.cb{background:var(--c);border-radius:10px;padding:10px;box-shadow:var(--sh);margin-bottom:10px}
.ch{font-size:12px;font-weight:700;text-align:center;margin-bottom:6px}
.ctbl{width:100%;border-collapse:collapse;font-size:11px}
.ctbl th{padding:2px 0;text-align:center;color:var(--t3);font-weight:500;font-size:10px}
.ctbl td{padding:2px 0;text-align:center}
.cd{width:26px;height:26px;line-height:26px;display:inline-block;cursor:pointer;transition:all .15s;border-radius:50%;text-align:center}
.cd.oy{color:var(--t3)}.cd.oy:hover{background:var(--bd)}
.cd.soy{color:var(--t3);font-weight:700}
.cd.tday{background:none;color:var(--t);text-decoration:underline;text-decoration-color:#ffc107;text-decoration-thickness:2px;font-weight:700}
.cd.has-schedule{font-weight:700}
.cd.booked{border:2px solid #4caf50; background:transparent; font-weight:normal; color:var(--t); line-height:22px}
.cd.gh{color:var(--ip);cursor:default}

.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}.mo.sh{display:flex}
.mx{background:var(--mb);padding:20px;border-radius:12px;width:92%;max-width:320px;max-height:90vh;overflow-y:auto}
.mx h3{margin-bottom:10px;font-size:15px}
.mx input{width:100%;padding:9px;border:2px solid var(--ip);border-radius:6px;font-size:13px;outline:none;background:var(--c);color:var(--t);margin-bottom:7px;font-family:inherit}
.mx input:focus{border-color:var(--g)}
.mx .bo{width:100%;padding:10px;background:var(--g);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;margin-top:4px}.mx .bo:hover{background:var(--gh)}

.ap{background:var(--abg);border:1px solid var(--abd);border-radius:10px;padding:12px;margin-top:14px;display:none;max-width:960px;margin-left:auto;margin-right:auto}
.ap h3{color:var(--acl);margin-bottom:6px;font-size:13px}
.ar{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.ab{padding:6px 10px;background:var(--g);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px}.ab:hover{opacity:.85}
.ab.d{background:var(--r)}.ab.w{background:#ff9800;color:#fff}

.et{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.et th{background:var(--abg);padding:5px;text-align:left;color:var(--acl);font-size:10px}
.et td{padding:4px;border-bottom:1px solid var(--bd)}
.et input{width:100%;padding:4px;border:1px solid var(--ip);border-radius:3px;font-size:11px;background:var(--c);color:var(--t);font-family:inherit}
.et input:focus{border-color:var(--g)}

.nl{max-height:300px;overflow-y:auto;font-size:12px;color:var(--t2)}
.ni{padding:8px 0;border-bottom:1px solid var(--bd)}.ni:last-child{border-bottom:none}
.ni .nm{font-weight:600;color:var(--t)}.ni .nt{font-size:10px;color:var(--t3);margin-top:2px}

@keyframes flashG{0%{background:var(--gbg)}100%{background:transparent}}
.flash{animation:flashG 1.2s ease-out}

@media(max-width:700px){.main{flex-direction:column;align-items:center}.lside{width:120px}.lside img{width:120px;height:120px}.cw{width:100%;max-width:320px}.sl{flex-direction:column;align-items:flex-start}.slr{align-self:flex-end}.mx{max-width:95%;padding:16px}.uinfo .uname,.uinfo .uphone{max-width:80px;font-size:11px}}
</style>

  <button class="bo" onclick="sendNotificationToAll()">Отправить</button>

</div></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
console.log("=== APP START ===");

var FC={
  apiKey:"AIzaSyCmJcDses0fO1s9E5ZoSSRhiEdCcEr3emI",
  authDomain:"forma-fit-zgr.firebaseapp.com",
  databaseURL:"https://forma-fit-zgr-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"forma-fit-zgr",
  storageBucket:"forma-fit-zgr.firebasestorage.app",
  messagingSenderId:"1091167121540",
  appId:"1:1091167121540:web:43f386e58ed6519472d2d1",
  measurementId:"G-PX9Z0G911P"
};
var ACODE="2022";

/* ===== Globals ===== */
var uid=null,isA=false,bk={},waitlist={},db=null;
var wC={},nwS=new Set(),alerts=[];
var tod=new Date(),vd=new Date(tod),sm="w";
var edD=null,edSch=[],pS=null;
var saveTimeout=null; // для автосохранения

/* ===== Helpers ===== */
function $(i){return document.getElementById(i)}
function E(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function S2(n){return n<10?"0"+n:""+n}
function Fd(d){return d.getFullYear()+"-"+S2(d.getMonth()+1)+"-"+S2(d.getDate())}
function PD(s){return new Date(s+"T00:00:00")}
function gM(d){var r=new Date(d),w=r.getDay();r.setDate(r.getDate()-((w+6)%7));r.setHours(0,0,0,0);return r}
function wK(d){return Fd(gM(d))}
function gid(){return "x"+Date.now()+"_"+Math.random().toString(36).substr(2,5)}

var MN=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
var WD=["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
var WDs=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

function mkEmpty(){
  return[
    {day:"Понедельник",dow:1,cls:[]},
    {day:"Вторник",dow:2,cls:[]},
    {day:"Среда",dow:3,cls:[]},
    {day:"Четверг",dow:4,cls:[]},
    {day:"Пятница",dow:5,cls:[]},
    {day:"Суббота",dow:6,cls:[]},
    {day:"Воскресенье",dow:7,cls:[]}
  ]
}

/* ===== Seed empty weeks for calendar display ===== */
(function(){
  var mon=gM(tod);
  for(var i=-3;i<10;i++){
    var d=new Date(mon);d.setDate(d.getDate()+i*7);
    wC[Fd(d)]=mkEmpty()
  }
  console.log("Seeded",Object.keys(wC).length,"weeks")
})();

/* ===== Theme ===== */
(function(){if(localStorage.getItem("th")==="d")document.documentElement.setAttribute("data-theme","dark")})();
function aTB(){$("tBtn").textContent=document.documentElement.hasAttribute("data-theme")?"☀️":"🌙"}
function togT(){var d=document.documentElement.hasAttribute("data-theme");
  if(d){document.documentElement.removeAttribute("data-theme");localStorage.setItem("th","l")}
  else{document.documentElement.setAttribute("data-theme","dark");localStorage.setItem("th","d")}aTB()}
aTB();

/* ===== Week Data from Firebase ===== */

function parseWeek(raw){
  if(!raw)return null;
  var result=[];
  for(var i=0;i<7;i++){
    var src=raw[i]||raw[""+i]||null;
    result.push({
      day:WD[i+1]||("День "+(i+1)),
      dow:i+1,
      cls:src&&src.cls?parseCls(src.cls):[]
    })
  }
  return result
}

function parseCls(raw){
  if(!raw)return[];
  if(Array.isArray(raw)){
    var r=[];
    for(var i=0;i<raw.length;i++){
      var c=raw[i];
      if(c&&c.name)r.push({id:c.id||gid(),time:c.time||"00:00",name:c.name,max:+c.max||15})
    }
    return r
  }
  var keys=Object.keys(raw).sort(function(a,b){return(+a)-(+b)});
  var r2=[];
  for(var j=0;j<keys.length;j++){
    var c2=raw[keys[j]];
    if(c2&&c2.name)r2.push({id:c2.id||gid(),time:c2.time||"00:00",name:c2.name,max:+c2.max||15})
  }
  return r2
}

function prepForSave(sch){
  var out={};
  for(var i=0;i<sch.length;i++){
    out[""+i]={day:sch[i].day,dow:sch[i].dow,cls:sch[i].cls||[]}
  }
  return out
}

function ldWk(d,cb){
  var k=wK(d);
  if(nwS.has(k)){console.log("Already loaded:",k);if(cb)cb();return}
  if(!db){if(cb)cb();return}
  console.log("Loading from DB:",k);
  db.ref("weekOverrides/"+k).once("value",function(s){
    var raw=s.val();
    console.log("DB response for",k,":",raw);
    if(raw){
      nwS.add(k);
      wC[k]=parseWeek(raw);
      console.log("Parsed week",k,":",wC[k])
    } else {
      console.log("No override for",k);
      nwS.delete(k)
    }
    if(cb)cb()
  },function(e){
    console.error("Load error:",k,e);
    if(cb)cb()
  })
}

function gWC(d){
  var k=wK(d);
  if(!wC[k]){return null}
  var base=PD(k);
  var result=[];
  for(var i=0;i<wC[k].length;i++){
    var di=wC[k][i];
    var cd=new Date(base);cd.setDate(cd.getDate()+i);
    result.push({day:di.day,dow:di.dow,date:Fd(cd),cls:di.cls.slice()})
  }
  return result
}

function gCD(week,ds){
  if(!week)return null;
  for(var i=0;i<week.length;i++)if(week[i].date===ds)return week[i];
  return null
}

function hasScheduleOnDate(ds){
  var week = gWC(PD(ds));
  if(!week) return false;
  var day = gCD(week, ds);
  if(!day) return false;
  return day.cls && day.cls.length > 0;
}

function hWk(k){
  if(!wC[k])return false;
  for(var i=0;i<wC[k].length;i++)if(wC[k][i].cls&&wC[k][i].cls.length>0)return true;
  return false
}

function hW(d){return hWk(wK(d))}

function hB(ds){
  if(!uid) return false;
  var week=gWC(PD(ds));if(!week)return false;
  var day=gCD(week,ds);if(!day)return false;
  for(var i=0;i<day.cls.length;i++){
    var sid=day.cls[i].id+"_"+ds;
    if(bk[sid]&&bk[sid][uid])return true
  }
  return false
}

/* ===== User Info ===== */
function updUI(){
  var fn=localStorage.getItem("fn"),fp=localStorage.getItem("fp");
  $("uNm").textContent=fn||"-";$("uPh").textContent=fp||"-";
  if(fn||fp)$("uinfo").style.display="flex"
}
function editU(){var n=prompt("Ваше имя:",localStorage.getItem("fn")||"");
  if(n!==null&&n.trim()){localStorage.setItem("fn",n.trim());updUI()}}
function editP(){var n=prompt("Ваш телефон:",localStorage.getItem("fp")||"");
  if(n!==null){localStorage.setItem("fp",n.trim());updUI()}}

/* ===== Render ===== */
function render(){
  try{rCal()}catch(e){console.error("rCal:",e)}
  try{rSch()}catch(e){console.error("rSch:",e)}
  if(uid)$("iBtn").classList.add("sh");else $("iBtn").classList.remove("sh");
  updUI()
}

function rCal(){
  var h=bMo(tod.getFullYear(),tod.getMonth());
  var nm=tod.getMonth()===11?{y:tod.getFullYear()+1,m:0}:{y:tod.getFullYear(),m:tod.getMonth()+1};
  h+=bMo(nm.y,nm.m);$("cal").innerHTML=h
}

function bMo(y,m){
  var firstDay = new Date(y, m, 1);
  var lastDay = new Date(y, m+1, 0);
  var daysInMonth = lastDay.getDate();
  var startWeekday = firstDay.getDay();
  var offset = startWeekday === 0 ? 6 : startWeekday - 1;
  
  var h='<div class="cb"><div class="ch">'+MN[m]+" "+y+'</div><table class="ctbl"><tr>';
  for(var i=0;i<7;i++)h+="<th>"+WDs[i]+"</th>";
  h+="</tr>";
  var dayCounter = 1;
  var today = new Date(tod.setHours(0,0,0,0));
  
  for(var row=0; row<6; row++) {
    h+="<tr>";
    for(var col=0; col<7; col++) {
      var cellDay = dayCounter - offset;
      if(cellDay < 1 || cellDay > daysInMonth) {
        h+="<td></td>";
        dayCounter++;
        continue;
      }
      var ds = y+"-"+S2(m+1)+"-"+S2(cellDay);
      var currentDate = new Date(ds);
      var isPast = currentDate < today;
      var hasSchedule = !isPast && hasScheduleOnDate(ds);
      var isBooked = !isPast && hB(ds);
      var isToday = ds === Fd(tod);
      var isSelected = (sm==="d" && ds===Fd(vd));
      
      var c="cd";
      if(isPast) {
        c+=" gh";
      } else {
        if(isToday) c+=" tday";
        if(isSelected) c+=" soy";
        if(hasSchedule) c+=" has-schedule";
        if(isBooked) c+=" booked";
        if(!hasSchedule && !isBooked && !isToday && !isSelected) c+=" oy";
      }
      h+='<td><span class="'+c+'" data-d="'+ds+'">'+cellDay+'</span></td>';
      dayCounter++;
    }
    h+="</tr>";
    if(dayCounter - offset > daysInMonth && row>=4) break;
  }
  h+="</table></div>";
  return h;
}

function rSch(){
  var h=rShd();
  if(sm==="d"){h+=rDay(Fd(vd))}
  else{var week=gWC(vd);
    if(week){for(var i=0;i<week.length;i++)h+=rDD(week[i])}
    else{ldWk(vd,function(){render()});h+='<div class="nc">Загрузка...</div>'}}
  $("sc").innerHTML=h
}

function rShd(){
  var h='<div class="shd">';
  if(sm==="d"){var dd=PD(Fd(vd));
    h+='<span class="ds">'+WD[dd.getDay()]+", "+Fd(vd).split("-").reverse().join(".")+"</span>";
    h+='<button class="rdd" onclick="sW()">← Назад</button>'}
  else{var mn=gM(vd),en=new Date(mn);en.setDate(en.getDate()+6);
    h+='<button class="wb" onclick="nvg(-7)">&#9664;</button>';
    h+='<span class="sv">'+Fd(mn).split("-").reverse().join(".")+" — "+Fd(en).split("-").reverse().join(".")+"</span>";
    h+='<button class="wb" onclick="nvg(7)">&#9654;</button>'}
  h+="</div>";return h
}

function rDay(ds){
  var week=gWC(PD(ds));
  if(!week){ldWk(PD(ds),function(){render()});return'<div class="nc">Загрузка...</div>'}
  var day=gCD(week,ds);if(!day)return'<div class="nc">Нет данных</div>';return rDD(day)
}

function rDD(day){
  var dd=PD(day.date),dayName=WD[dd.getDay()],dateStr=day.date.split("-").reverse().join(".");
  var h='<div class="dy"><div class="dyhd">'+E(dayName)+' <span class="d2">('+dateStr+')</span></div>';
  if(!day.cls||!day.cls.length)h+='<div class="nc">Занятий нет</div>';
  else for(var i=0;i<day.cls.length;i++)h+=rSl(day.cls[i],day.date);
  h+="</div>";return h
}

function rSl(s,ds){
  var sid=s.id+"_"+ds,e=bk[sid]||{};
  var ls=[];for(var k in e)if(e.hasOwnProperty(k))ls.push({u:k,n:e[k].name,p:e[k].phone||""});
  var mi=uid&&e[uid],fu=ls.length>=s.max;
  var wl = waitlist[sid] || {};
  var inWaitlist = uid && wl[uid];
  
  var h='<div class="sl"><div class="sll"><div class="st">'+E(s.time)+" — "+E(s.name)+"</div><div class='sn'>";
  if(ls.length){
    h+="👥 ";
    for(var i=0;i<ls.length;i++){
      if(i)h+=", ";
      h+=E(ls[i].n);
      if(isA && ls[i].p){
        h+=' <span class="phone-icon" title="Телефон" data-phone="'+E(ls[i].p)+'" onclick="showPhone(this)">📞</span>';
      }
    }
  } else h+="Пока никто не записался";
  if(isA && Object.keys(wl).length){
    h+="<br><span style='font-size:10px;color:var(--blue)'>Резерв: ";
    var wlNames=[];
    for(var wu in wl)if(wl[wu].name)wlNames.push(E(wl[wu].name));
    h+=wlNames.join(", ")+"</span>";
  }
  h+='</div></div><div class="slr"><span class="ct">'+ls.length+"/"+s.max+"</span>";
  if(uid){
    if(mi){
      h+='<span style="color:var(--g);font-weight:500;margin-right:4px">Вы записаны</span>';
      h+='<button class="b br" data-a="ca" data-s="'+sid+'">✖</button>';
    } else if(inWaitlist){
      h+='<span style="color:var(--blue);font-weight:500;margin-right:4px">В резерве</span>';
      h+='<button class="b br" data-a="cancelWait" data-s="'+sid+'">✖</button>';
    } else if(!fu){
      h+='<button class="b bg" data-a="sg" data-s="'+sid+'">Записаться</button>';
    } else {
      h+='<button class="b b-blue" data-a="addWait" data-s="'+sid+'">Добавить в резерв</button>';
    }
  }
  if(isA&&ls.length)h+='<button class="bclr" data-a="ac" data-s="'+sid+'">Очистить</button>';
  h+="</div></div>";return h
}

function showPhone(el){
  var phone = el.getAttribute("data-phone");
  if(phone) alert("Телефон: "+phone);
}

/* ===== Schedule Editor ===== */

function pW(){var d=PD($("wP").value);d.setDate(d.getDate()-7);$("wP").value=Fd(d);ldE()}
function nW(){var d=PD($("wP").value);d.setDate(d.getDate()+7);$("wP").value=Fd(d);ldE()}

function rET(){

function svE(){
  var ins=$("eB").querySelectorAll("input");
  for(var i=0;i<ins.length;i++){
    var inp=ins[i],di=+inp.dataset.d,ci=+inp.dataset.c,f=inp.dataset.f;
    if(edSch[di]&&edSch[di].cls[ci])

  }
}

function autoSave(){
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(function(){
    if(isA && db && edD){
      svW();
    }
  }, 1000);
}

function svW(){
  if(!isA||!db)return;svE();
  var k=Fd(edD);
  console.log("Saving week:",k);
  var toSave=prepForSave(edSch);
  console.log("Prepared:",JSON.stringify(toSave));
  db.ref("weekOverrides/"+k).set(toSave,function(e){

function cpP(){
  var d=new Date(edD);d.setDate(d.getDate()-7);

function clW(){

/* ===== Admin Notifications ===== */

  if(!isA){sAl("Доступно только администратору");return;}

  $("notifyText").value="";
}
function sendNotificationToAll(){

  var notifRef=db.ref("adminNotifications").push();

  },function(err){

function listenAdminNotifications(){
  if(!db)return;
  db.ref("adminNotifications").orderByChild("timestamp").limitToLast(20).on("child_added",function(snap){
    var data=snap.val();
    var msg=data.message;
    if(Notification && Notification.permission==="granted"){

    }
    aAl(msg);

function aAl(msg){
  if(alerts.length && alerts[alerts.length-1].message===msg) return;
  alerts.push({message:msg,time:Date.now()});
  $("bdot").style.display="block";
}
function showNM(){
  var h="";
  if(!alerts.length) h='<div class="nc">Нет уведомлений</div>';
  else{
    var rev=alerts.slice().reverse();
    for(var i=0;i<rev.length;i++){
      h+='<div class="ni"><div class="nm">'+E(rev[i].message)+'</div><div class="nt">'+new Date(rev[i].time).toLocaleString("ru")+'</div></div>';
    }
  }
  $("nL").innerHTML=h;
  opMo("mN");
  $("bdot").style.display="none";
}
function sBN(t,b){if(Notification&&Notification.permission==="granted")try{new Notification(t,{body:b,silent:true})}catch(e){}}

/* ===== Notifications for clients (time-based) ===== */
function cNtf(){
  var now=new Date(),ds=Fd(now),week=gWC(now);if(!week)return;
  var ns=JSON.parse(localStorage.getItem("ns")||"{}"),tb=[];
  for(var di=0;di<week.length;di++){if(week[di].date===ds){
    for(var ci=0;ci<week[di].cls.length;ci++){var s=week[di].cls[ci];
      if(bk[s.id+"_"+ds]&&bk[s.id+"_"+ds][uid])tb.push(s)}}}
  if(!tb.length)return;
  if(now.getHours()===10&&now.getMinutes()<2){var k="m10_"+ds;if(!ns[k]){ns[k]=1;localStorage.setItem("ns",JSON.stringify(ns));
    var tx="Сегодня "+tb.length+" занятий";aAl(tx);sBN("Напоминание",tx)}}
  for(var ti=0;ti<tb.length;ti++){var s=tb[ti],tp=s.time.split(":"),cl=new Date(now);
    cl.setHours(+tp[0],+tp[1],0,0);var mB=(cl-now)/60000;
    if(mB>=119.5&&mB<=120.5){var k="m2h_"+s.id+"_"+ds;if(!ns[k]){ns[k]=1;localStorage.setItem("ns",JSON.stringify(ns));
      var tx="Через 2ч: "+s.time+" "+s.name;aAl(tx);sBN(s.time+" "+s.name,"Занятие через 2 часа!")}}}
}

  vd=newDate;
  var k=wK(vd);

document.addEventListener("click",function(e){

    var selectedDate=PD(ce.dataset.d);

      edSch[di3].cls.splice(ci3,1);
